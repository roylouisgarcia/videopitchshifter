# Video Pitch Adjuster Configuration
# You can modify these default values

[DEFAULT_SETTINGS]
# Default pitch adjustment range (in semitones)
min_pitch = -20
max_pitch = 20

# Default audio quality settings
audio_bitrate = 192k
audio_sample_rate = 44100
audio_channels = 2

# Default video codec settings
video_codec = copy  # 'copy' preserves original video, 'libx264' for re-encoding
audio_codec = aac

# Temporary file settings
temp_audio_format = wav
temp_audio_codec = pcm_s16le

# UI Settings
window_width = 800
window_height = 600

# Default file paths (leave empty for no defaults)
default_input_path = 
default_output_path = 

# Processing settings
show_ffmpeg_output = false  # Set to true for debugging
use_hardware_acceleration = false  # Experimental, may not work on all systems
